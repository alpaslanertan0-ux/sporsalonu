<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - FitTakip</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="login-body">

<div class="login-container">
    <div class="login-card">

        <div class="login-header">
            <h2>DriFit</h2>
            <p>Yönetici paneline giriş yapın</p>
        </div>

        <div th:if="${hataMesaji}" style="color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 12px; border-radius: 5px; margin-bottom: 15px; font-size: 14px; text-align: center; font-weight: bold;">
            <span th:text="${hataMesaji}"></span>
        </div>

        <form th:action="@{/login}" method="POST" class="login-form">

            <div class="form-group">
                <label for="kullaniciAdi">Kullanıcı Adı</label>
                <input type="text" id="kullaniciAdi" name="kullaniciAdi" placeholder="Örn: admin" required>
            </div>

            <div class="form-group">
                <label for="sifre">Şifre</label>
                <input type="password" id="sifre" name="sifre" placeholder="••••••••" required>
            </div>

            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox" name="hatirla"> Beni Hatırla
                </label>
                <a th:href="@{/sifremi-unuttum}" class="forgot-password">Şifremi Unuttum</a>
            </div>

            <button type="submit" class="btn-primary login-btn">Giriş Yap</button>

        </form>

    </div>
</div>

</body>
</html>
